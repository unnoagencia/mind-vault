name = "mind-vault"
main = "src/index.ts"
compatibility_date = "2025-02-01"
compatibility_flags = ["nodejs_compat"]

# ──────────────────────────────────────────────────────────────────────────────
# Mind Vault — shared wrangler config (placeholders)
#
# This file is committed. Replace the REPLACE_ME_* placeholders with the IDs
# your agent (or you) creates in step 2 of CLAUDE.md. If you need a private
# override for your own environment (custom domain, real IDs without editing
# this file), create wrangler.local.toml — it is gitignored — and run wrangler
# with: `wrangler deploy --config wrangler.local.toml`.
# ──────────────────────────────────────────────────────────────────────────────

[[d1_databases]]
binding = "DB"
database_name = "mind-vault"
database_id = "REPLACE_ME_D1_ID"
migrations_dir = "src/db/migrations"

[[vectorize]]
binding = "VECTORIZE"
index_name = "mind-vault-embeddings"

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "MindVaultMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MindVaultMCP"]

[assets]
directory = "./assets"
binding = "ASSETS"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "REPLACE_ME_OAUTH_KV_ID"

[[kv_namespaces]]
binding = "GRAPH_CACHE"
id = "REPLACE_ME_GRAPH_CACHE_ID"
