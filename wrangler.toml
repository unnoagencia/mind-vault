name = "mind-vault"
main = "src/index.ts"
compatibility_date = "2025-02-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain — Cloudflare auto-provisions DNS + SSL.
# The domain's zone must be on the same Cloudflare account.
[[routes]]
pattern = "mind.robsonlins.com"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "mind-vault"
database_id = "0707d49a-d76e-40dd-8b0c-24186f8e9d3e"
migrations_dir = "src/db/migrations"

[[vectorize]]
binding = "VECTORIZE"
index_name = "mind-vault-embeddings"

[ai]
binding = "AI"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "MindVaultMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MindVaultMCP"]

[assets]
directory = "./assets"
binding = "ASSETS"

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "f9b7d9089728449c8479c2c3c01b6eca"

[[kv_namespaces]]
binding = "GRAPH_CACHE"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_KV_ID"
